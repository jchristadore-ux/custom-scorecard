<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PlayPal — Golf Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  background:#0F1C2E;
  color:#F5F5F5;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ============================================================
   CSS VARIABLES — PlayPal Brand
   ============================================================ */
:root{
  --navy:#0F1C2E;
  --navy-light:#162338;
  --navy-card:#1A2D44;
  --navy-card2:#1F3352;
  --green:#0A5C3E;
  --green-bright:#00C853;
  --green-glow:rgba(0,200,83,0.12);
  --green-dim:#08472f;
  --gold:#D4AF77;
  --gold-dim:#b8944e;
  --gold-glow:rgba(212,175,119,0.12);
  --bg:#0F1C2E;
  --surface:#122030;
  --card:#1A2D44;
  --card2:#1F3352;
  --border:#1e3050;
  --border2:#254066;
  --text:#F5F5F5;
  --text-dim:#7a9bbf;
  --text-muted:#4a6a8a;
  --red:#FF5252;
  --birdie:#00C853;
  --eagle:#D4AF77;
  --bogey:#FF9800;
  --double:#FF5252;
  --radius:14px;
  --tab-h:56px;
}

/* ============================================================
   APP TABS — PlayPal nav bar
   ============================================================ */
.app-tabs{
  position:fixed;top:0;left:0;right:0;
  height:var(--tab-h);
  background:var(--navy);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.4);
}
.app-tab{
  flex:1;border:none;background:transparent;
  color:var(--text-dim);
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;
  cursor:pointer;transition:color 0.2s,border-bottom 0.2s;
  border-bottom:2px solid transparent;
  height:100%;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.app-tab.active{color:var(--green-bright);border-bottom-color:var(--green-bright);}

/* PlayPal wordmark — centered brand pill in tab bar */
.brand-wordmark{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;
  pointer-events:none;
}
.brand-fist{font-size:1.3rem;line-height:1;}
.brand-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:2px;
  background:linear-gradient(135deg,var(--green-bright) 0%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}

.tab-panel{display:none;padding-top:var(--tab-h);}
.tab-panel.active{display:block;}

/* ============================================================
   SETUP TAB
   ============================================================ */
.setup-body{max-width:900px;margin:0 auto;padding:20px 16px 40px;}
.setup-header{padding:28px 0 12px;text-align:center;}
.setup-header h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.8rem;letter-spacing:4px;
  background:linear-gradient(135deg,var(--green-bright) 0%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-transform:uppercase;
}
.setup-header p{font-size:0.85rem;color:var(--text-dim);margin-top:6px;font-weight:400;}

.section{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:0.85rem;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--gold);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.section-title::before{
  content:'';display:inline-block;width:3px;height:14px;
  background:linear-gradient(to bottom,var(--green-bright),var(--gold));
  border-radius:2px;
}

.form-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-group{flex:1;min-width:120px;}
.form-group label{font-size:0.7rem;color:var(--text-dim);letter-spacing:0.8px;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:600;}
.form-group input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);border-radius:10px;padding:9px 12px;font-size:0.9rem;
  font-family:'DM Sans',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;
}
.form-group input:focus{outline:none;border-color:var(--green-bright);box-shadow:0 0 0 3px rgba(0,200,83,0.1);}

.hole-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hole-grid table{width:100%;border-collapse:collapse;font-size:0.72rem;}
.hole-grid th,.hole-grid td{
  text-align:center;padding:5px 2px;border:1px solid var(--border);
  color:var(--text-dim);min-width:26px;
}
.hole-grid th{background:var(--green);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.68rem;}
.hole-grid td.lbl{text-align:left;padding-left:6px;font-weight:600;color:var(--text);width:50px;}
.hole-grid td.sum{background:var(--green);color:var(--gold);font-weight:700;}
.hole-grid input{
  width:100%;background:transparent;border:none;color:var(--text);
  text-align:center;font-size:0.72rem;padding:0;
}
.hole-grid input:focus{outline:none;color:var(--green-bright);}

.player-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.player-row:last-child{border-bottom:none;}
.player-order{
  flex:0 0 26px;height:26px;
  background:linear-gradient(135deg,var(--green),var(--green-dim));
  border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-size:0.72rem;font-weight:700;
  font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.5px;
  flex-shrink:0;
}
.player-inputs{flex:1;display:flex;gap:8px;}
.player-inputs input{
  flex:1;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);border-radius:10px;padding:9px 12px;font-size:0.9rem;
  font-family:'DM Sans',sans-serif;transition:border-color 0.2s;
}
.player-inputs input:focus{outline:none;border-color:var(--green-bright);box-shadow:0 0 0 3px rgba(0,200,83,0.1);}
.drag-handle{color:var(--text-muted);font-size:1.1rem;cursor:grab;padding:0 4px;touch-action:none;}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn{
  background:var(--card2);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:9px 16px;font-size:0.82rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0.3px;
  transition:background 0.15s,border-color 0.15s,transform 0.1s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{background:var(--border2);transform:scale(0.97);}
.btn-gold{
  background:linear-gradient(135deg,var(--green) 0%,#0d7a52 100%);
  color:#fff;border-color:var(--green);
  box-shadow:0 4px 16px rgba(10,92,62,0.35);
}
.btn-gold:active{background:var(--green-dim);transform:scale(0.97);}
.btn-danger{border-color:#c0392b;color:var(--red);}
.btn-start-round{
  width:100%;padding:18px;font-size:1.1rem;letter-spacing:1.5px;
  margin-top:8px;font-weight:700;
  background:linear-gradient(135deg,var(--green-bright) 0%,#00a844 100%);
  color:#0F1C2E;border:none;
  box-shadow:0 6px 24px rgba(0,200,83,0.35);
  border-radius:14px;
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;
}
.btn-start-round:active{transform:scale(0.98);}

.format-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.format-toggle:last-child{border-bottom:none;}
.format-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.95rem;color:var(--text);}
.toggle-sw{
  position:relative;width:46px;height:26px;
  background:var(--border2);border-radius:13px;cursor:pointer;
  transition:background 0.2s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.toggle-sw.on{background:linear-gradient(135deg,var(--green-bright),#00a844);}
.toggle-sw::after{
  content:'';position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform 0.2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.toggle-sw.on::after{transform:translateX(20px);}

.preset-area{display:flex;flex-direction:column;gap:8px;}
.preset-area textarea{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:10px;font-size:0.78rem;resize:vertical;min-height:60px;
  font-family:monospace;
}
.preset-area textarea:focus{outline:none;border-color:var(--green-bright);}

/* ============================================================
   PLAY TAB — SHELL
   ============================================================ */
.play-start-wrap{
  min-height:calc(100vh - var(--tab-h));
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at 50% 30%, rgba(10,92,62,0.18) 0%, transparent 70%);
}
.play-start{text-align:center;max-width:400px;}
.play-start-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:4rem;letter-spacing:5px;
  background:linear-gradient(135deg,var(--green-bright) 0%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.play-start h2{
  font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:500;
  color:var(--text-dim);margin-bottom:6px;
}
.play-start .course-name{
  font-size:1rem;color:var(--text);margin-bottom:32px;font-weight:600;
}
.btn-tee-it-up{
  background:linear-gradient(135deg,var(--green-bright) 0%,#00a844 100%);
  color:#0F1C2E;border:none;
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;font-weight:400;
  letter-spacing:3px;padding:20px 48px;border-radius:14px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 8px 32px rgba(0,200,83,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
}
.btn-tee-it-up:active{
  background:linear-gradient(135deg,#00a844 0%,var(--green) 100%);
  transform:scale(0.97);box-shadow:0 4px 16px rgba(0,200,83,0.3);
}

.play-active{display:none;}

/* ============================================================
   HOLE NAVIGATION BAR
   ============================================================ */
.hole-nav-bar{
  background:var(--navy);border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 12px;gap:5px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;height:46px;
}
.hole-nav-bar::-webkit-scrollbar{display:none;}
.hnb-btn{
  flex-shrink:0;width:32px;height:30px;border:1px solid var(--border);
  background:var(--card);color:var(--text-dim);
  border-radius:7px;font-size:0.78rem;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
  font-family:'DM Sans',sans-serif;
}
.hnb-btn.scored{border-color:#0a3d28;background:#0a1f14;color:var(--green-bright);}
.hnb-btn.current{
  border-color:var(--green-bright);
  background:rgba(0,200,83,0.12);
  color:var(--green-bright);
  font-weight:700;
}

/* ============================================================
   HOLE HEADER
   ============================================================ */
.hole-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.hole-badge{
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(135deg,var(--green) 0%,var(--green-dim) 100%);
  border-radius:12px;
  width:58px;height:58px;justify-content:center;
  box-shadow:0 4px 12px rgba(10,92,62,0.4);
}
.hb-num{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:var(--gold);line-height:1;letter-spacing:1px;
}
.hb-lbl{font-size:0.55rem;color:rgba(212,175,119,0.7);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.hole-meta{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hm-par{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--text);letter-spacing:1px;
}
.hm-par-lbl{font-size:0.6rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.hm-yds{font-size:0.8rem;color:var(--text-dim);font-weight:500;margin-top:2px;}
.hole-nav-arrows{display:flex;gap:8px;}
.nav-arrow{
  width:46px;height:46px;border:1px solid var(--border2);background:var(--card);
  color:var(--text);border-radius:11px;font-size:1.5rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
}
.nav-arrow:active{background:var(--border2);}
.nav-arrow:disabled{opacity:0.3;cursor:not-allowed;}

/* ============================================================
   FORMAT TABS
   ============================================================ */
.fmt-tabs{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
}
.fmt-tab{
  flex:1;padding:11px 4px;border:none;background:transparent;
  color:var(--text-dim);
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;
  border-bottom:2px solid transparent;transition:color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.fmt-tab.active{color:var(--green-bright);border-bottom-color:var(--green-bright);}

.fmt-pane{display:none;padding:14px 12px;}
.fmt-pane.active{display:block;}

/* ============================================================
   STROKE TAB
   ============================================================ */
.stroke-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media(min-width:500px){
  .stroke-grid{grid-template-columns:repeat(4,1fr);}
}

.stroke-card{
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);padding:12px 8px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:border-color 0.2s;
}
.stroke-card.has-score{border-color:#0a3d28;}
.stroke-card.is-wolf{border-color:var(--red);}
.stroke-card.has-money{box-shadow:0 0 0 1px var(--gold) inset;}
.sc-player-name{
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;
  color:var(--text);text-align:center;line-height:1;
}
.sc-to-par{font-size:0.7rem;color:var(--text-dim);margin-top:2px;text-align:center;font-weight:500;}
.sc-to-par.under{color:var(--birdie);}
.sc-to-par.over{color:var(--bogey);}
.sc-to-par.dbl{color:var(--double);}
.stroke-meta-row{display:flex;gap:8px;width:100%;}
.stroke-meta-btn{
  flex:1;padding:6px 4px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);border-radius:8px;cursor:pointer;text-align:center;
  font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.3px;
  transition:all 0.15s;
}
.stroke-meta-btn.active-wolf{border-color:var(--red);color:var(--red);background:rgba(255,82,82,0.08);}
.stroke-meta-btn.active-money{border-color:var(--gold);color:var(--gold);background:rgba(212,175,119,0.08);}
.stroke-meta-btn.active-partner{border-color:var(--green-bright);color:var(--green-bright);background:rgba(0,200,83,0.08);}
.stroke-meta-btn.active-lone{border-color:var(--red);color:var(--red);background:rgba(255,82,82,0.08);}

.status-panel-wrap{margin-bottom:12px;}
.status-panel-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--gold);
  margin:0 0 8px;
}
.status-panel{
  background:var(--surface);border:1px solid var(--border);
  display:flex;padding:8px 12px;gap:8px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  border-radius:12px;
}
.status-panel::-webkit-scrollbar{display:none;}
.status-panel-item{
  flex:1;min-width:70px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:var(--card);border-radius:8px;padding:6px 8px;
}
.status-panel-name{font-size:0.62rem;color:var(--text-dim);letter-spacing:0.5px;font-weight:600;text-transform:uppercase;}
.status-panel-value{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;color:var(--text);
}
.status-panel-meta{font-size:0.58rem;color:var(--text-muted);}
.status-panel-value.under{color:var(--birdie);}
.status-panel-value.over{color:var(--bogey);}
.status-panel-value.dbl{color:var(--double);}

/* Score controls */
.score-ctrl{
  display:flex;align-items:stretch;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;overflow:hidden;width:100%;
}
.score-adj{
  flex:0 0 44px;border:none;background:transparent;
  color:var(--text);font-size:1.6rem;font-weight:300;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:background 0.1s;
  min-height:60px;
}
.score-adj:active{background:var(--border);}
.score-val{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:1px;
  cursor:pointer;min-height:60px;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.score-val.empty{color:var(--text-muted);}
.score-val.empty::after{content:'—';font-size:1.6rem;font-family:'DM Sans',sans-serif;font-weight:300;}
.score-val.eagle{color:var(--eagle);text-shadow:0 0 20px rgba(212,175,119,0.5);}
.score-val.birdie{color:var(--birdie);text-shadow:0 0 12px rgba(0,200,83,0.4);}
.score-val.par{color:var(--text);}
.score-val.bogey{color:var(--bogey);}
.score-val.double{color:var(--double);}
.score-val-lbl{font-size:0.5rem;font-weight:700;letter-spacing:1px;opacity:0.7;margin-top:-4px;font-family:'DM Sans',sans-serif;text-transform:uppercase;}

/* 3-putt toggle */
.three-putt-row{display:flex;gap:8px;margin-top:6px;}
.three-putt-btn{
  flex:1;padding:8px 4px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);border-radius:8px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:600;
  letter-spacing:0.3px;text-transform:uppercase;text-align:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
}
.three-putt-btn.active{background:rgba(255,82,82,0.1);border-color:var(--red);color:var(--red);}
.three-putt-btn:active{opacity:0.7;}

/* ============================================================
   PTM TAB
   ============================================================ */
.ptm-holder-label{
  text-align:center;
  font-family:'Bebas Neue',sans-serif;font-size:0.95rem;
  letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;
  margin-bottom:12px;
}
.ptm-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media(min-width:500px){
  .ptm-grid{grid-template-columns:repeat(4,1fr);}
}

.ptm-btn{
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;min-height:110px;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;user-select:none;
  position:relative;overflow:hidden;
}
.ptm-btn::after{
  content:'';position:absolute;inset:0;
  background:var(--green-glow);opacity:0;transition:opacity 0.2s;
}
.ptm-btn.holding{border-color:var(--green-bright);}
.ptm-btn.holding::after{opacity:1;}
.ptm-btn:active{transform:scale(0.96);}
.ptm-abbr{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:1px;
  color:var(--text);position:relative;z-index:1;
  transition:color 0.15s;
}
.ptm-btn.holding .ptm-abbr{color:var(--green-bright);}
.ptm-full-name{
  font-size:0.7rem;color:var(--text-dim);text-align:center;
  position:relative;z-index:1;line-height:1.2;font-weight:500;
}
.ptm-money-icon{
  font-size:1.6rem;opacity:0;transition:opacity 0.2s;
  position:relative;z-index:1;
}
.ptm-btn.holding .ptm-money-icon{opacity:1;}

.ptm-no-holder{
  text-align:center;font-size:0.85rem;color:var(--text-muted);
  padding:8px;background:var(--surface);border-radius:8px;margin-top:12px;font-weight:500;
}

/* ============================================================
   WOLF TAB
   ============================================================ */
.wolf-who-row{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--green) 0%,var(--green-dim) 100%);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  box-shadow:0 4px 12px rgba(10,92,62,0.35);
}
.wolf-who-lbl{font-size:0.65rem;color:rgba(212,175,119,0.7);letter-spacing:2px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;}
.wolf-who-name{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1.5px;color:var(--gold);
}

.wolf-mode-row{display:flex;gap:8px;margin-bottom:14px;}
.wolf-mode-btn{
  flex:1;padding:9px;border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);border-radius:10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;
  letter-spacing:0.3px;text-align:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
}
.wolf-mode-btn.active{background:rgba(255,82,82,0.1);border-color:var(--red);color:var(--red);}
.wolf-mode-btn:active{opacity:0.7;}

.wolf-partner-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
@media(min-width:500px){
  .wolf-partner-grid{grid-template-columns:repeat(4,1fr);}
}

.wolf-player-btn{
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;min-height:100px;
  transition:all 0.15s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.wolf-player-btn::after{
  content:'';position:absolute;inset:0;
  background:var(--green-glow);opacity:0;transition:opacity 0.2s;
}
.wolf-player-btn.is-wolf{border-color:var(--red);cursor:default;}
.wolf-player-btn.is-wolf::after{background:rgba(255,82,82,0.08);opacity:1;}
.wolf-player-btn.is-partner{border-color:var(--green-bright);}
.wolf-player-btn.is-partner::after{opacity:1;}
.wolf-player-btn.lone-wolf{border-color:var(--red);}
.wolf-player-btn:active:not(.is-wolf){transform:scale(0.96);}

.wpb-abbr{
  font-family:'Bebas Neue',sans-serif;font-size:2.1rem;letter-spacing:1px;color:var(--text);
  position:relative;z-index:1;transition:color 0.15s;
}
.wolf-player-btn.is-wolf .wpb-abbr{color:var(--red);}
.wolf-player-btn.is-partner .wpb-abbr{color:var(--green-bright);}
.wpb-name{font-size:0.65rem;color:var(--text-dim);text-align:center;position:relative;z-index:1;font-weight:500;}
.wpb-role{
  font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  position:relative;z-index:1;font-family:'DM Sans',sans-serif;
}
.wpb-pts{
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.5px;
  color:var(--text-dim);position:relative;z-index:1;
}
.wolf-player-btn.is-wolf .wpb-role{color:var(--red);}
.wolf-player-btn.is-partner .wpb-role{color:var(--green-bright);}

.wolf-scores-row{
  display:grid;gap:6px;margin-top:12px;
}
.wolf-adjust-row{
  margin-top:6px;width:100%;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;z-index:1;
}
.wolf-adjust-btn{
  width:28px;height:28px;border:1px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:background 0.1s;
}
.wolf-adjust-btn:active{background:var(--border);}
.wolf-adjust-lbl{
  font-size:0.58rem;color:var(--text-dim);letter-spacing:0.6px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;
}

/* ============================================================
   PAR 3 TAB
   ============================================================ */
.par3-na{
  text-align:center;color:var(--text-muted);font-size:0.9rem;padding:32px 16px;
}
.par3-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:500px){.par3-grid{grid-template-columns:repeat(4,1fr);}}
.par3-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.p3-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;color:var(--text);}
.p3-dist{
  width:80px;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);border-radius:8px;padding:8px;text-align:center;
  font-size:1.1rem;font-family:'DM Sans',sans-serif;
  transition:border-color 0.2s;
}
.p3-dist:focus{outline:none;border-color:var(--green-bright);}
.p3-unit{font-size:0.65rem;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}

/* ============================================================
   SCORE POPUP
   ============================================================ */
.popup-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.popup-overlay.open{display:flex;}
.score-popup{
  background:var(--card);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;padding:20px 16px 32px;
  width:100%;max-width:480px;
  box-shadow:0 -8px 40px rgba(0,0,0,0.5);
}
.sp-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.sp-title{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1.5px;color:var(--green-bright);
}
.sp-close{
  background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.sp-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
}
.sp-btn{
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  border-radius:10px;padding:0;height:64px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:0.5px;
  -webkit-tap-highlight-color:transparent;transition:background 0.1s,transform 0.1s;
}
.sp-btn:active{background:var(--border);transform:scale(0.95);}
.sp-btn.eagle{border-color:var(--gold);color:var(--eagle);}
.sp-btn.birdie{border-color:var(--birdie);color:var(--birdie);}
.sp-btn.par{border-color:var(--border2);color:var(--text);}
.sp-btn.bogey{border-color:var(--bogey);color:var(--bogey);}
.sp-btn.double{border-color:var(--double);color:var(--double);}
.sp-btn.cur{background:var(--border2);}
.sp-lbl{font-size:0.42rem;font-weight:700;letter-spacing:0.8px;opacity:0.7;font-family:'DM Sans',sans-serif;text-transform:uppercase;}

/* ============================================================
   SUMMARY BAR
   ============================================================ */
.summary-bar{
  border-top:1px solid var(--border);
  padding:8px 0 0;
  margin-top:12px;
}

/* ============================================================
   PRINT TAB
   ============================================================ */
.print-body{max-width:900px;margin:0 auto;padding:20px 16px 40px;}
.print-bar{text-align:center;padding:24px 0;}
.print-bar .btn-gold{
  font-size:1rem;padding:16px 36px;
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;
  border-radius:12px;
}
.preview-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.preview-label{
  font-size:0.68rem;color:var(--text-dim);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:10px;font-weight:600;
}
#scorecard-preview{
  background:white;min-width:900px;
  font-family:Arial,sans-serif;font-size:7pt;
  box-shadow:0 4px 32px rgba(0,0,0,0.4);
  border-radius:8px;overflow:hidden;
}

/* ============================================================
   SCORECARD PRINT STYLES — unchanged
   ============================================================ */
.sc-header{
  background:#0A5C3E;color:white;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;
}
.sc-course{font-size:9pt;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sc-sub{font-size:7pt;color:rgba(255,255,255,0.7);}
.sc-gold{color:#D4AF77;font-size:8pt;font-weight:700;}

.sc-table{width:100%;border-collapse:collapse;}
.sc-table th,.sc-table td{
  border:1px solid #ccc;padding:3px 2px;text-align:center;
  font-size:6.5pt;
}
.sc-table th{background:#0A5C3E;color:white;font-weight:700;}
.sc-table td.lbl{text-align:left;padding-left:4px;font-weight:700;background:#f5f7fa;white-space:nowrap;}
.sc-table td.sum{background:#0A5C3E;color:#D4AF77;font-weight:700;}
.sc-table tr:nth-child(even) td{background:#f9fafb;}
.sc-table tr:nth-child(even) td.lbl{background:#edf0f5;}
.sc-table tr:nth-child(even) td.sum{background:#0A5C3E;}

.sc-fmt-hdr{
  background:#0A5C3E;color:#D4AF77;
  padding:3px 8px;font-size:7pt;font-weight:700;letter-spacing:1px;
  display:flex;justify-content:space-between;
}
.sc-fmt-rule{color:rgba(255,255,255,0.6);font-size:6pt;font-weight:400;}

.sc-ptm-footer{
  display:flex;gap:20px;padding:4px 8px;font-size:6pt;
  background:#f5f7fa;border:1px solid #ddd;
}

/* ============================================================
   RESET BTN
   ============================================================ */
.reset-btn{
  display:block;margin:12px auto;background:none;border:1px solid var(--border);
  color:var(--text-muted);border-radius:8px;padding:8px 20px;cursor:pointer;
  font-size:0.78rem;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;
  transition:border-color 0.15s;
}
.reset-btn:active{background:var(--card);}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* ============================================================
   MEDIA PRINT
   ============================================================ */
@media print{
  @page{size:11in 8.5in;margin:0.18in;}
  body{background:white;}
  .app-tabs,.play-start-wrap,.hole-nav-bar,.hole-header,.fmt-tabs,
  .fmt-pane,.summary-bar,.score-popup,.popup-overlay,
  .setup-body,.print-bar,.preview-label,.reset-btn{display:none!important;}
  #print-panel{display:block!important;padding-top:0;}
  #scorecard-preview{
    width:100%;min-width:unset;box-shadow:none;border-radius:0;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  .sc-header,.sc-fmt-hdr{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
}
</style>
</head>
<body>

<!-- ====== APP TABS ====== -->
<div class="app-tabs">
  <button class="app-tab active" id="tab-setup" onclick="switchTab('setup')">⚙ Setup</button>
  <!-- Centered PlayPal wordmark -->
  <div class="brand-wordmark">
    <span class="brand-fist">🤜</span>
    <span class="brand-text">PlayPal</span>
  </div>
  <button class="app-tab" id="tab-play"  onclick="switchTab('play')">⛳ Play</button>
  <button class="app-tab" id="tab-print" onclick="switchTab('print')">🖨 Print</button>
</div>

<!-- ====== SETUP TAB ====== -->
<div id="setup-panel" class="tab-panel active">
<div class="setup-body">
  <div class="setup-header">
    <h1>PlayPal</h1>
    <p>Custom scorecard for your golf crew. Let's play.</p>
  </div>

  <!-- COURSE -->
  <div class="section">
    <div class="section-title">Course</div>
    <div class="form-row">
      <div class="form-group" style="flex:3">
        <label>Course Name</label>
        <input type="text" id="inp-course" placeholder="BEAVER BROOK COUNTRY CLUB" oninput="rebuild()">
      </div>
      <div class="form-group" style="flex:1">
        <label>Tees</label>
        <input type="text" id="inp-tee" placeholder="Black Tees" oninput="rebuild()">
      </div>
      <div class="form-group" style="flex:1">
        <label>Group</label>
        <input type="text" id="inp-group" placeholder="EGT" oninput="rebuild()">
      </div>
    </div>
  </div>

  <!-- HOLE DATA -->
  <div class="section">
    <div class="section-title">Hole Data</div>
    <div class="hole-grid">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
            <th style="color:var(--gold)">OUT</th>
            <th>10</th><th>11</th><th>12</th><th>13</th><th>14</th><th>15</th><th>16</th><th>17</th><th>18</th>
            <th style="color:var(--gold)">IN</th>
            <th style="color:var(--gold)">TOT</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="lbl">Par</td>
            <td><input id="par-1" oninput="rebuild()"></td><td><input id="par-2" oninput="rebuild()"></td>
            <td><input id="par-3" oninput="rebuild()"></td><td><input id="par-4" oninput="rebuild()"></td>
            <td><input id="par-5" oninput="rebuild()"></td><td><input id="par-6" oninput="rebuild()"></td>
            <td><input id="par-7" oninput="rebuild()"></td><td><input id="par-8" oninput="rebuild()"></td>
            <td><input id="par-9" oninput="rebuild()"></td>
            <td class="sum" id="sum-par-out"></td>
            <td><input id="par-10" oninput="rebuild()"></td><td><input id="par-11" oninput="rebuild()"></td>
            <td><input id="par-12" oninput="rebuild()"></td><td><input id="par-13" oninput="rebuild()"></td>
            <td><input id="par-14" oninput="rebuild()"></td><td><input id="par-15" oninput="rebuild()"></td>
            <td><input id="par-16" oninput="rebuild()"></td><td><input id="par-17" oninput="rebuild()"></td>
            <td><input id="par-18" oninput="rebuild()"></td>
            <td class="sum" id="sum-par-in"></td><td class="sum" id="sum-par-tot"></td>
          </tr>
          <tr>
            <td class="lbl">Yards</td>
            <td><input id="yds-1" oninput="rebuild()"></td><td><input id="yds-2" oninput="rebuild()"></td>
            <td><input id="yds-3" oninput="rebuild()"></td><td><input id="yds-4" oninput="rebuild()"></td>
            <td><input id="yds-5" oninput="rebuild()"></td><td><input id="yds-6" oninput="rebuild()"></td>
            <td><input id="yds-7" oninput="rebuild()"></td><td><input id="yds-8" oninput="rebuild()"></td>
            <td><input id="yds-9" oninput="rebuild()"></td>
            <td class="sum" id="sum-yds-out"></td>
            <td><input id="yds-10" oninput="rebuild()"></td><td><input id="yds-11" oninput="rebuild()"></td>
            <td><input id="yds-12" oninput="rebuild()"></td><td><input id="yds-13" oninput="rebuild()"></td>
            <td><input id="yds-14" oninput="rebuild()"></td><td><input id="yds-15" oninput="rebuild()"></td>
            <td><input id="yds-16" oninput="rebuild()"></td><td><input id="yds-17" oninput="rebuild()"></td>
            <td><input id="yds-18" oninput="rebuild()"></td>
            <td class="sum" id="sum-yds-in"></td><td class="sum" id="sum-yds-tot"></td>
          </tr>
          <tr>
            <td class="lbl">Hdcp</td>
            <td><input id="hcp-1" oninput="rebuild()"></td><td><input id="hcp-2" oninput="rebuild()"></td>
            <td><input id="hcp-3" oninput="rebuild()"></td><td><input id="hcp-4" oninput="rebuild()"></td>
            <td><input id="hcp-5" oninput="rebuild()"></td><td><input id="hcp-6" oninput="rebuild()"></td>
            <td><input id="hcp-7" oninput="rebuild()"></td><td><input id="hcp-8" oninput="rebuild()"></td>
            <td><input id="hcp-9" oninput="rebuild()"></td>
            <td class="sum"></td>
            <td><input id="hcp-10" oninput="rebuild()"></td><td><input id="hcp-11" oninput="rebuild()"></td>
            <td><input id="hcp-12" oninput="rebuild()"></td><td><input id="hcp-13" oninput="rebuild()"></td>
            <td><input id="hcp-14" oninput="rebuild()"></td><td><input id="hcp-15" oninput="rebuild()"></td>
            <td><input id="hcp-16" oninput="rebuild()"></td><td><input id="hcp-17" oninput="rebuild()"></td>
            <td><input id="hcp-18" oninput="rebuild()"></td>
            <td class="sum"></td><td class="sum"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- PLAYERS -->
  <div class="section">
    <div class="section-title">Players</div>
    <div id="players-list"></div>
    <div class="btn-row">
      <button class="btn" onclick="randomizePlayerOrder()">🔀 Randomize Order</button>
      <button class="btn" onclick="addPlayer()">+ Add Player</button>
      <button class="btn btn-danger" onclick="removeLastPlayer()">− Remove Last</button>
    </div>
  </div>

  <!-- FORMATS -->
  <div class="section">
    <div class="section-title">Scoring Formats</div>
    <div id="formats-list"></div>
  </div>

  <!-- PRESETS -->
  <div class="section">
    <div class="section-title">Presets</div>
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn" onclick="loadBeaverBrook()">Load Beaver Brook</button>
      <button class="btn" onclick="exportPreset()">Export JSON</button>
    </div>
    <div class="preset-area">
      <textarea id="preset-json" placeholder="Paste JSON preset here..."></textarea>
      <button class="btn" onclick="importPreset()">Import</button>
    </div>
  </div>

  <div style="padding:8px 0 16px;text-align:center;">
    <button class="btn btn-gold btn-start-round" onclick="switchTab('play')">⛳ TEE IT UP →</button>
  </div>
</div>
</div><!-- /setup-panel -->

<!-- ====== PLAY TAB ====== -->
<div id="play-panel" class="tab-panel">

  <!-- Start screen -->
  <div id="play-start" class="play-start-wrap">
    <div class="play-start">
      <div class="play-start-logo">
        <span>🤜</span>PlayPal
      </div>
      <h2>Ready to play?</h2>
      <div class="course-name" id="play-course-name">—</div>
      <button class="btn-tee-it-up" onclick="startPlay()">TEE IT UP</button>
    </div>
  </div>

  <!-- Active play -->
  <div id="play-active" class="play-active">

    <!-- Hole nav -->
    <div class="hole-nav-bar" id="hole-nav-bar"></div>

    <!-- Hole header -->
    <div class="hole-header">
      <div class="hole-badge">
        <div class="hb-num" id="ph-num">1</div>
        <div class="hb-lbl">Hole</div>
      </div>
      <div class="hole-meta">
        <div>
          <span class="hm-par" id="ph-par">4</span>
          <span class="hm-par-lbl"> Par</span>
        </div>
        <div class="hm-yds" id="ph-yds">—</div>
      </div>
      <div class="hole-nav-arrows">
        <button class="nav-arrow" id="btn-prev" onclick="goHole(playState.currentHole-1)">‹</button>
        <button class="nav-arrow" id="btn-next" onclick="goHole(playState.currentHole+1)">›</button>
      </div>
    </div>

    <!-- Format tabs -->
    <div class="fmt-tabs" id="fmt-tabs"></div>

    <!-- Format panes -->
    <div id="pane-stroke" class="fmt-pane active">
      <div class="status-panel-wrap">
        <div class="status-panel-title">Score</div>
        <div class="status-panel" id="score-banner"></div>
      </div>
      <div class="status-panel-wrap">
        <div class="status-panel-title">Wolf Points</div>
        <div class="status-panel" id="wolf-points-banner"></div>
      </div>
      <div class="stroke-grid" id="stroke-cards"></div>
      <div class="three-putt-row" id="three-putt-row"></div>
    </div>

    <div id="pane-ptm" class="fmt-pane">
      <div class="ptm-holder-label">💰 WHO HAS THE MONEY?</div>
      <div class="ptm-grid" id="ptm-cards"></div>
      <div id="ptm-status"></div>
    </div>

    <div id="pane-wolf" class="fmt-pane">
      <div class="wolf-who-row">
        <span class="wolf-who-lbl">🐺 Wolf This Hole</span>
        <span class="wolf-who-name" id="wolf-who-name">—</span>
      </div>
      <div class="wolf-mode-row">
        <button class="wolf-mode-btn" id="btn-lone-wolf" onclick="toggleLoneWolf(false)">Lone Wolf</button>
        <button class="wolf-mode-btn" id="btn-blind-wolf" onclick="toggleLoneWolf(true)">Blind Wolf</button>
      </div>
      <div class="wolf-partner-grid" id="wolf-cards"></div>
    </div>

    <div id="pane-par3" class="fmt-pane">
      <div class="par3-grid" id="par3-cards"></div>
    </div>

    <button class="reset-btn" onclick="confirmReset()">↺ Reset Scores</button>

    <!-- Summary -->
    <div class="summary-bar">
      <div class="status-panel" id="summary-bar"></div>
    </div>

  </div>
</div><!-- /play-panel -->

<!-- ====== PRINT TAB ====== -->
<div id="print-panel" class="tab-panel">
  <div class="print-body">
    <div class="print-bar">
      <button class="btn btn-gold" style="font-size:1rem;padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;border-radius:12px;" onclick="window.print()">🖨 PRINT SCORECARD</button>
    </div>
    <div class="preview-wrap">
      <div class="preview-label">Live Preview</div>
      <div id="scorecard-preview"></div>
    </div>
  </div>
</div>

<!-- ====== SCORE POPUP ====== -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopupIfOutside(event)">
  <div class="score-popup">
    <div class="sp-header">
      <div class="sp-title" id="sp-title">Score</div>
      <button class="sp-close" onclick="closePopup()">×</button>
    </div>
    <div class="sp-grid" id="sp-grid"></div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   BEAVER BROOK DEFAULT
   ============================================================ */
var BB = {
  course_name:'BEAVER BROOK COUNTRY CLUB',
  tee_color:'Black Tees',
  group_name:'EGT',
  players:[
    {full_name:'Gadget',    abbreviation:'G'},
    {full_name:'Straight T',abbreviation:'ST'},
    {full_name:'Bird',      abbreviation:'B'},
    {full_name:'Iron Mike', abbreviation:'IM'}
  ],
  holes:[
    {par:5,yards:495,hdcp:13},{par:5,yards:474,hdcp:11},{par:4,yards:371,hdcp:5},
    {par:3,yards:159,hdcp:17},{par:4,yards:392,hdcp:7}, {par:4,yards:396,hdcp:3},
    {par:3,yards:172,hdcp:15},{par:4,yards:396,hdcp:1}, {par:4,yards:302,hdcp:9},
    {par:4,yards:358,hdcp:10},{par:4,yards:374,hdcp:6}, {par:3,yards:128,hdcp:18},
    {par:4,yards:365,hdcp:4}, {par:3,yards:146,hdcp:16},{par:4,yards:433,hdcp:2},
    {par:4,yards:414,hdcp:8}, {par:5,yards:504,hdcp:12},{par:5,yards:476,hdcp:14}
  ],
  formats:[
    {id:'stroke',label:'Stroke',enabled:true},
    {id:'ptm',   label:'PTM $', enabled:true},
    {id:'wolf',  label:'Wolf',  enabled:true},
    {id:'par3',  label:'Par 3', enabled:true}
  ]
};

/* ============================================================
   STATE
   ============================================================ */
var state = deepClone(BB);

var playState = null;

function makePlayState(){
  var n = state.players.length;
  var holes = Array.from({length:18}, function(_, holeIdx){
    return {
      scores:new Array(n).fill(null),
      threePutt:new Array(n).fill(false),
      wolf:(n?(n-1+holeIdx)%n:0),
      wolfPartner:null,
      loneWolf:false,
      wolfBlind:false,
      moneyHolder:holeIdx===0?0:null,
      moneyManual:holeIdx===0,
      par3Dist:new Array(n).fill(null)
    };
  });
  return {
    currentHole:0,
    activeFmt:firstEnabledFmt(),
    holes:holes,
    wolfAdjust:new Array(n).fill(0)
  };
}

function firstEnabledFmt(){
  for(var i=0;i<state.formats.length;i++){
    if(state.formats[i].enabled) return state.formats[i].id;
  }
  return 'stroke';
}

/* ============================================================
   HELPERS
   ============================================================ */
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getHoleState(holeIdx){ return playState.holes[holeIdx]; }
function getScore(pi,holeIdx){ return getHoleState(holeIdx).scores[pi]; }
function setScore(pi,holeIdx,val){ getHoleState(holeIdx).scores[pi]=val; }
function getThreePutt(pi,holeIdx){ return !!getHoleState(holeIdx).threePutt[pi]; }
function setThreePutt(pi,holeIdx,val){ getHoleState(holeIdx).threePutt[pi]=!!val; }
function getPar3Dist(pi,holeIdx){ return getHoleState(holeIdx).par3Dist[pi]; }
function setPar3Dist(pi,holeIdx,val){ getHoleState(holeIdx).par3Dist[pi]=val; }

function scoreClass(score,par){
  if(score===null) return 'empty';
  var d=score-par;
  if(d<=-2) return 'eagle';
  if(d===-1) return 'birdie';
  if(d===0)  return 'par';
  if(d===1)  return 'bogey';
  return 'double';
}
function scoreLbl(score,par){
  if(score===null) return '';
  var d=score-par;
  if(d<=-2) return score===1?'ACE':'EAGLE';
  if(d===-1) return 'BIRDIE';
  if(d===0)  return 'PAR';
  if(d===1)  return 'BOGEY';
  if(d===2)  return 'DBL';
  return '+'+d;
}

function toParStr(pi){
  var tot=0,parTot=0,played=0;
  for(var i=0;i<18;i++){
    var score=getScore(pi,i);
    if(score!==null){ tot+=score; parTot+=state.holes[i].par; played++; }
  }
  if(!played) return '—';
  var d=tot-parTot;
  return (d===0?'E':d>0?'+'+d:String(d))+' · thru '+played;
}
function toParClass(pi){
  var tot=0,parTot=0,played=0;
  for(var i=0;i<18;i++){
    var score=getScore(pi,i);
    if(score!==null){ tot+=score; parTot+=state.holes[i].par; played++; }
  }
  if(!played) return '';
  var d=tot-parTot;
  if(d<0) return 'under';
  if(d>3) return 'dbl';
  if(d>0) return 'over';
  return '';
}

/* ============================================================
   TAB SWITCHING
   ============================================================ */
function switchTab(id){
  ['setup','play','print'].forEach(function(t){
    document.getElementById(t+'-panel').classList.toggle('active', t===id);
    document.getElementById('tab-'+t).classList.toggle('active', t===id);
  });
  if(id==='play' && !playState){
    var n=state.players.length;
    document.getElementById('play-course-name').textContent=
      (document.getElementById('inp-course').value||BB.course_name);
  }
  if(id==='print') rebuild();
}

/* ============================================================
   SETUP UI
   ============================================================ */
function renderPlayers(){
  var list=document.getElementById('players-list');
  list.innerHTML='';
  state.players.forEach(function(p,i){
    var row=document.createElement('div');
    row.className='player-row';
    row.innerHTML=
      '<span class="player-order">'+(i+1)+'</span>'+
      '<span class="drag-handle">☰</span>'+
      '<div class="player-inputs">'+
        '<input type="text" placeholder="Full Name" value="'+esc(p.full_name)+'" oninput="state.players['+i+'].full_name=this.value;rebuild()">'+
        '<input type="text" placeholder="Abbr" style="max-width:70px" value="'+esc(p.abbreviation)+'" oninput="state.players['+i+'].abbreviation=this.value;rebuild()">'+
      '</div>';
    list.appendChild(row);
  });
}

function fisherYatesShuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];
    arr[i]=arr[j];
    arr[j]=tmp;
  }
  return arr;
}

function reorderPlayState(oldPlayers,newPlayers){
  if(!playState) return;
  var indexMap=newPlayers.map(function(player){
    return oldPlayers.indexOf(player);
  });
  playState.holes.forEach(function(h){
    h.scores=indexMap.map(function(oldIdx){ return h.scores[oldIdx]; });
    h.threePutt=indexMap.map(function(oldIdx){ return h.threePutt[oldIdx]; });
    h.par3Dist=indexMap.map(function(oldIdx){ return h.par3Dist[oldIdx]; });
    if(h.wolf>=newPlayers.length) h.wolf=0;
    if(h.wolfPartner!==null&&h.wolfPartner>=newPlayers.length) h.wolfPartner=null;
    if(h.moneyHolder!==null&&h.moneyHolder>=newPlayers.length) h.moneyHolder=0;
  });
  playState.wolfAdjust=indexMap.map(function(oldIdx){
    return playState.wolfAdjust[oldIdx]||0;
  });
}

function randomizePlayerOrder(){
  if(state.players.length<2) return;
  var oldPlayers=state.players.slice();
  var shuffled=fisherYatesShuffle(state.players.slice());
  state.players=shuffled;
  reorderPlayState(oldPlayers,shuffled);
  renderPlayers();
  rebuild();
  if(playState){
    buildFmtTabs();
    refreshHole(playState.currentHole);
  }
}

function renderFormats(){
  var list=document.getElementById('formats-list');
  list.innerHTML='';
  state.formats.forEach(function(f,i){
    var row=document.createElement('div');
    row.className='format-toggle';
    row.innerHTML=
      '<span class="format-name">'+esc(f.label)+'</span>'+
      '<div class="toggle-sw'+(f.enabled?' on':'')+'" onclick="toggleFmt('+i+')"></div>';
    list.appendChild(row);
  });
}

function toggleFmt(i){
  state.formats[i].enabled=!state.formats[i].enabled;
  renderFormats();
  rebuild();
}

function addPlayer(){
  if(state.players.length>=6) return;
  state.players.push({full_name:'Player '+(state.players.length+1),abbreviation:'P'+(state.players.length+1)});
  renderPlayers();
}
function removeLastPlayer(){
  if(state.players.length<=2) return;
  state.players.pop();
  renderPlayers();
}

function loadBeaverBrook(){
  state=deepClone(BB);
  loadStateToUI();
}

function loadStateToUI(){
  document.getElementById('inp-course').value = state.course_name||'';
  document.getElementById('inp-tee').value    = state.tee_color||'';
  document.getElementById('inp-group').value  = state.group_name||'';
  state.holes.forEach(function(h,i){
    var n=i+1;
    document.getElementById('par-'+n).value  = h.par;
    document.getElementById('yds-'+n).value  = h.yards;
    document.getElementById('hcp-'+n).value  = h.hdcp;
  });
  updateHoleSums();
  renderPlayers();
  renderFormats();
  rebuild();
}

function updateHoleSums(){
  var parOut=0,parIn=0,ydsOut=0,ydsIn=0;
  for(var i=1;i<=9;i++){
    parOut+=parseInt(document.getElementById('par-'+i).value)||0;
    ydsOut+=parseInt(document.getElementById('yds-'+i).value)||0;
  }
  for(var i=10;i<=18;i++){
    parIn+=parseInt(document.getElementById('par-'+i).value)||0;
    ydsIn+=parseInt(document.getElementById('yds-'+i).value)||0;
  }
  document.getElementById('sum-par-out').textContent=parOut||'';
  document.getElementById('sum-par-in').textContent=parIn||'';
  document.getElementById('sum-par-tot').textContent=(parOut+parIn)||'';
  document.getElementById('sum-yds-out').textContent=ydsOut||'';
  document.getElementById('sum-yds-in').textContent=ydsIn||'';
  document.getElementById('sum-yds-tot').textContent=(ydsOut+ydsIn)||'';
}

function syncHolesFromUI(){
  for(var i=0;i<18;i++){
    var n=i+1;
    state.holes[i]={
      par:   parseInt(document.getElementById('par-'+n).value)||4,
      yards: parseInt(document.getElementById('yds-'+n).value)||0,
      hdcp:  parseInt(document.getElementById('hcp-'+n).value)||0
    };
  }
}

function rebuild(){
  syncHolesFromUI();
  state.course_name = document.getElementById('inp-course').value || BB.course_name;
  state.tee_color   = document.getElementById('inp-tee').value    || '';
  state.group_name  = document.getElementById('inp-group').value  || '';
  updateHoleSums();
  buildScorecard();
}

function exportPreset(){
  var txt=JSON.stringify(state,null,2);
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){ alert('Copied to clipboard.'); });
  } else {
    document.getElementById('preset-json').value=txt;
  }
}
function importPreset(){
  try{
    var d=JSON.parse(document.getElementById('preset-json').value);
    state=d;
    loadStateToUI();
    alert('Preset imported.');
  }catch(e){ alert('Invalid JSON: '+e.message); }
}

/* ============================================================
   START PLAY
   ============================================================ */
function startPlay(){
  syncHolesFromUI();
  playState=makePlayState();
  document.getElementById('play-start').style.display='none';
  document.getElementById('play-active').style.display='block';
  buildHoleNav();
  buildFmtTabs();
  goHole(0);
}

function buildHoleNav(){
  var bar=document.getElementById('hole-nav-bar');
  bar.innerHTML='';
  for(var i=0;i<18;i++){
    var btn=document.createElement('button');
    btn.className='hnb-btn';
    btn.id='hnb-'+i;
    btn.textContent=i+1;
    (function(idx){
      btn.addEventListener('click',function(){ goHole(idx); });
    })(i);
    bar.appendChild(btn);
  }
}

function buildFmtTabs(){
  var bar=document.getElementById('fmt-tabs');
  bar.innerHTML='';
  var enabled=state.formats.filter(function(f){ return f.enabled; });
  if(!enabled.length) return;
  enabled.forEach(function(f){
    var btn=document.createElement('button');
    btn.className='fmt-tab'+(f.id===playState.activeFmt?' active':'');
    btn.textContent=f.label;
    btn.dataset.fmt=f.id;
    btn.addEventListener('click',function(){ switchFmt(f.id); });
    bar.appendChild(btn);
  });
}

function switchFmt(id){
  playState.activeFmt=id;
  document.querySelectorAll('.fmt-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.fmt===id);
  });
  document.querySelectorAll('.fmt-pane').forEach(function(p){
    p.classList.toggle('active', p.id==='pane-'+id);
  });
}

/* ============================================================
   HOLE NAVIGATION
   ============================================================ */
function goHole(idx){
  if(idx<0||idx>17) return;
  playState.currentHole=idx;
  recomputePtmHolders();

  document.querySelectorAll('.hnb-btn').forEach(function(b,i){
    b.classList.remove('current');
    var scored=playState.holes[i].scores.some(function(score){ return score!==null; });
    b.classList.toggle('scored',scored);
  });
  var cur=document.getElementById('hnb-'+idx);
  if(cur){
    cur.classList.add('current');
    cur.classList.remove('scored');
    try{ cur.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }catch(_){}
  }

  var h=state.holes[idx];
  document.getElementById('ph-num').textContent = idx+1;
  document.getElementById('ph-par').textContent = h.par;
  document.getElementById('ph-yds').textContent = h.yards+' yds';
  document.getElementById('btn-prev').disabled  = idx===0;
  document.getElementById('btn-next').disabled  = idx===17;

  renderAllPanes(idx);
  renderSummary();
}

function renderAllPanes(idx){
  renderStroke(idx);
  renderPtm(idx);
  renderWolf(idx);
  renderPar3(idx);
}

/* ============================================================
   STROKE RENDER
   ============================================================ */
function renderStroke(holeIdx){
  var container=document.getElementById('stroke-cards');
  container.innerHTML='';
  renderScoreBanner();
  renderWolfPointsBanner();
  var par=state.holes[holeIdx].par;
  var hole=getHoleState(holeIdx);
  var wolfIdx=hole.wolf;
  var moneyIdx=hole.moneyHolder;

  state.players.forEach(function(p,pi){
    var score=getScore(pi,holeIdx);
    var cls=scoreClass(score,par);
    var lbl=scoreLbl(score,par);
    var isWolf=pi===wolfIdx;
    var isMoney=pi===moneyIdx;
    var isPartner=hole.wolfPartner===pi&&!hole.loneWolf&&!isWolf;

    var card=document.createElement('div');
    card.className='stroke-card'+(score!==null?' has-score':'')+(isWolf?' is-wolf':'')+(isMoney?' has-money':'');
    card.id='sc-'+pi;

    var valHtml;
    if(score===null){
      valHtml='<div class="score-val empty" onclick="openPopup('+pi+','+holeIdx+')"></div>';
    } else {
      valHtml=
        '<div class="score-val '+cls+'" onclick="openPopup('+pi+','+holeIdx+')">'+
          score+'<div class="score-val-lbl">'+lbl+'</div>'+
        '</div>';
    }

    card.innerHTML=
      '<div class="sc-player-name">'+esc(p.full_name)+'</div>'+
      '<div class="sc-to-par '+toParClass(pi)+'">'+toParStr(pi)+'</div>'+
      '<div class="stroke-meta-row">'+
        '<button class="stroke-meta-btn '+(isWolf?'active-wolf':'')+'" onclick="setWolfForHole('+holeIdx+','+pi+')">'+(isWolf?'🐺 Wolf':'🐺')+'</button>'+
        '<button class="stroke-meta-btn '+(isMoney?'active-money':'')+'" onclick="setMoneyHolder('+holeIdx+','+pi+',true)">'+(isMoney?'💲 Money':'💲')+'</button>'+
      '</div>'+
      '<div class="stroke-meta-row">'+
        '<button class="stroke-meta-btn '+(isPartner?'active-partner':'')+'" onclick="toggleWolfPartnerFromStroke('+holeIdx+','+pi+')">'+(isPartner?'🤝 Partner':'🤝 Partner')+'</button>'+
        '<button class="stroke-meta-btn '+(isWolf&&hole.loneWolf?'active-lone':'')+'" onclick="toggleLoneWolfFromStroke('+holeIdx+','+pi+')">'+(isWolf&&hole.loneWolf?'🐺 Lone':'Lone Wolf')+'</button>'+
      '</div>'+
      '<div class="score-ctrl">'+
        '<button class="score-adj" onclick="adjustScore('+pi+','+holeIdx+',-1)">−</button>'+
        valHtml+
        '<button class="score-adj" onclick="adjustScore('+pi+','+holeIdx+',+1)">+</button>'+
      '</div>';

    container.appendChild(card);
  });

  var row=document.getElementById('three-putt-row');
  row.innerHTML='';
  state.players.forEach(function(p,pi){
    var is3=getThreePutt(pi,holeIdx);
    var btn=document.createElement('button');
    btn.className='three-putt-btn'+(is3?' active':'');
    btn.textContent=esc(p.abbreviation||p.full_name.charAt(0))+' 3-Putt';
    (function(playerIdx){
      btn.addEventListener('click',function(){
        setThreePutt(playerIdx,holeIdx,!getThreePutt(playerIdx,holeIdx));
        refreshHole(holeIdx);
      });
    })(pi);
    row.appendChild(btn);
  });
}

/* ============================================================
   SCORE ADJUST & POPUP
   ============================================================ */
function adjustScore(pi,holeIdx,delta){
  var cur=getScore(pi,holeIdx);
  if(cur===null){
    setScore(pi,holeIdx,Math.max(1,state.holes[holeIdx].par+delta));
  } else {
    setScore(pi,holeIdx,Math.max(1,Math.min(12,cur+delta)));
  }
  refreshHole(holeIdx);
}

function refreshHole(holeIdx){
  recomputePtmHolders();
  renderAllPanes(holeIdx);
  renderSummary();
  var btn=document.getElementById('hnb-'+holeIdx);
  if(btn && holeIdx!==playState.currentHole){
    var scored=playState.holes[holeIdx].scores.some(function(score){ return score!==null; });
    btn.classList.toggle('scored',scored);
  }
}

var popupCtx=null;
function openPopup(pi,holeIdx){
  popupCtx={pi:pi,holeIdx:holeIdx};
  var par=state.holes[holeIdx].par;
  var cur=getScore(pi,holeIdx);
  document.getElementById('sp-title').textContent=
    esc(state.players[pi].full_name)+' — Hole '+(holeIdx+1)+' (Par '+par+')';
  var grid=document.getElementById('sp-grid');
  grid.innerHTML='';
  for(var s=1;s<=10;s++){
    var btn=document.createElement('button');
    var cls=scoreClass(s,par);
    btn.className='sp-btn '+cls+(s===cur?' cur':'');
    var lbl=scoreLbl(s,par);
    btn.innerHTML=s+'<div class="sp-lbl">'+lbl+'</div>';
    (function(score){
      btn.addEventListener('click',function(){
        setScore(pi,holeIdx,score);
        closePopup();
        refreshHole(holeIdx);
      });
    })(s);
    grid.appendChild(btn);
  }
  document.getElementById('popup-overlay').classList.add('open');
}
function closePopup(){ document.getElementById('popup-overlay').classList.remove('open'); }
function closePopupIfOutside(e){
  if(e.target===document.getElementById('popup-overlay')) closePopup();
}

/* ============================================================
   PTM RENDER
   ============================================================ */
function nextPtmPlayer(playerIdx){
  var n=state.players.length||1;
  return (playerIdx+1)%n;
}

function didPtmHolderLoseHole(playerIdx,holeIdx){
  var holderScore=getScore(playerIdx,holeIdx);
  if(holderScore===null) return false;
  var par=state.holes[holeIdx].par;
  var isThreePutt=getThreePutt(playerIdx,holeIdx);
  var isDoubleOrWorse=holderScore>=par+2;
  return isThreePutt||isDoubleOrWorse;
}

function recomputePtmHolders(){
  if(!playState||!playState.holes.length) return;
  var carry=0;
  playState.holes.forEach(function(hole,holeIdx){
    var resolved=hole.moneyManual&&hole.moneyHolder!==null?hole.moneyHolder:carry;
    hole.moneyHolder=resolved;
    carry=didPtmHolderLoseHole(resolved,holeIdx)?nextPtmPlayer(resolved):resolved;
  });
}

function setMoneyHolder(holeIdx,playerIdx,isManual){
  var hole=getHoleState(holeIdx);
  hole.moneyHolder=playerIdx;
  hole.moneyManual=!!isManual;
  recomputePtmHolders();
}

function resolvePtmAuto(holeIdx){
  recomputePtmHolders();
  return getHoleState(holeIdx).moneyHolder;
}

function resolvePtmFinalHole18(){
  recomputePtmHolders();
  var startHolder=getHoleState(17).moneyHolder;
  var holder=startHolder;
  for(var i=0;i<state.players.length;i++){
    if(!didPtmHolderLoseHole(holder,17)) return holder;
    holder=nextPtmPlayer(holder);
  }
  return startHolder;
}

function renderPtm(holeIdx){
  var container=document.getElementById('ptm-cards');
  container.innerHTML='';
  recomputePtmHolders();
  var curHolder=holeIdx===17?resolvePtmFinalHole18():resolvePtmAuto(holeIdx);

  state.players.forEach(function(p,pi){
    var isHolder=curHolder===pi;
    var btn=document.createElement('div');
    btn.className='ptm-btn'+(isHolder?' holding':'');
    btn.innerHTML=
      '<div class="ptm-money-icon">💰</div>'+
      '<div class="ptm-abbr">'+esc(p.abbreviation||p.full_name.charAt(0))+'</div>'+
      '<div class="ptm-full-name">'+esc(p.full_name)+'</div>';
    (function(playerIdx){
      btn.addEventListener('click',function(){
        setMoneyHolder(holeIdx,playerIdx,true);
        refreshHole(holeIdx);
      });
    })(pi);
    container.appendChild(btn);
  });

  var status=document.getElementById('ptm-status');
  status.innerHTML='<div class="ptm-no-holder">Hole '+(holeIdx+1)+' — '+esc(state.players[curHolder].full_name)+' has the money</div>';
}

/* ============================================================
   WOLF RENDER
   ============================================================ */
function getWolfIdx(holeIdx){
  return getHoleState(holeIdx).wolf;
}

function setWolfForHole(holeIdx,playerIdx){
  var hole=getHoleState(holeIdx);
  hole.wolf=playerIdx;
  if(hole.wolfPartner===playerIdx) hole.wolfPartner=null;
  refreshHole(holeIdx);
}

function toggleWolfPartnerFromStroke(holeIdx,playerIdx){
  var hole=getHoleState(holeIdx);
  if(playerIdx===hole.wolf) return;
  if(hole.wolfPartner===playerIdx){
    hole.wolfPartner=null;
  } else {
    hole.wolfPartner=playerIdx;
    hole.loneWolf=false;
    hole.wolfBlind=false;
  }
  refreshHole(holeIdx);
}

function toggleLoneWolfFromStroke(holeIdx,playerIdx){
  var hole=getHoleState(holeIdx);
  if(playerIdx!==hole.wolf) return;
  hole.loneWolf=!hole.loneWolf;
  if(hole.loneWolf) hole.wolfPartner=null;
  hole.wolfBlind=false;
  refreshHole(holeIdx);
}

function calcWolfPts(holeIdx){
  var n=state.players.length;
  var pts=new Array(n).fill(0);
  if(n<2) return pts;
  var hole=getHoleState(holeIdx);
  var wolfIdx=hole.wolf;
  var wp=hole.wolfPartner;
  var isLone=hole.loneWolf;
  var scores=state.players.map(function(_,i){
    return getScore(i,holeIdx);
  });
  if(scores.some(function(s){ return s===null; })) return pts;

  var minScore=Math.min.apply(null,scores);

  if(isLone){
    var wolfScore=scores[wolfIdx];
    var othersMin=null;
    scores.forEach(function(s,i){
      if(i!==wolfIdx&&(othersMin===null||s<othersMin)) othersMin=s;
    });
    if(wolfScore<othersMin){ pts[wolfIdx]=2*n; }
    else {
      scores.forEach(function(s,i){
        if(i!==wolfIdx&&s===othersMin) pts[i]=2;
      });
    }
  } else if(wp!==null&&wp!==wolfIdx){
    var teamA=scores[wolfIdx]+scores[wp];
    var opponents=scores
      .map(function(s,i){ return {score:s,idx:i}; })
      .filter(function(entry){ return entry.idx!==wolfIdx&&entry.idx!==wp; });
    var teamB=opponents[0].score+opponents[1].score;
    if(teamA<teamB){
      pts[wolfIdx]=1;
      pts[wp]=1;
    } else if(teamA>teamB){
      pts[opponents[0].idx]=1;
      pts[opponents[1].idx]=1;
    }
  } else {
    if(scores[wolfIdx]===minScore){
      var ties=scores.filter(function(s){ return s===minScore; }).length;
      if(ties===1) pts[wolfIdx]=n-1;
    } else {
      scores.forEach(function(s,i){
        if(i!==wolfIdx&&s===minScore) pts[i]=1;
      });
    }
  }
  return pts;
}

function calcWolfBasePts(pi){
  var tot=0;
  for(var h=0;h<18;h++){
    tot+=calcWolfPts(h)[pi];
  }
  return tot;
}

function calcWolfTotalPts(pi){
  var base=calcWolfBasePts(pi);
  var adj=playState&&playState.wolfAdjust?playState.wolfAdjust[pi]||0:0;
  return Math.max(0,base+adj);
}

function adjustWolfPoints(pi,delta){
  if(!playState||!playState.wolfAdjust) return;
  var base=calcWolfBasePts(pi);
  var curAdj=playState.wolfAdjust[pi]||0;
  var nextTotal=Math.max(0,base+curAdj+delta);
  playState.wolfAdjust[pi]=nextTotal-base;
  refreshHole(playState.currentHole);
}

function calcStrokeTotal(pi){
  var tot=0;
  var hasAny=false;
  for(var h=0;h<18;h++){
    var s=getScore(pi,h);
    if(s!==null){
      hasAny=true;
      tot+=s;
    }
  }
  return hasAny?tot:'—';
}

function renderStatusPanel(containerId, itemBuilder){
  var panel=document.getElementById(containerId);
  if(!panel) return;
  panel.innerHTML='';
  state.players.forEach(function(p,pi){
    var data=itemBuilder(p,pi)||{};
    var item=document.createElement('div');
    item.className='status-panel-item';
    item.innerHTML=
      '<div class="status-panel-name">'+esc(data.name||'')+'</div>'+
      '<div class="status-panel-value '+(data.valueClass||'')+'">'+esc(String(data.value||''))+'</div>'+
      '<div class="status-panel-meta">'+esc(data.meta||'')+'</div>';
    panel.appendChild(item);
  });
}

  renderStatusPanel('score-banner',function(p,pi){
    return {
      name:p.abbreviation||p.full_name.charAt(0),
      value:calcStrokeTotal(pi),
      valueClass:''
    };
  });
}

function renderWolfPointsBanner(){
  renderStatusPanel('wolf-points-banner',function(p,pi){
    return {
      name:p.abbreviation||p.full_name.charAt(0),
      value:calcWolfTotalPts(pi),
      valueClass:''
    };
  });
}

function renderWolf(holeIdx){
  var hole=getHoleState(holeIdx);
  var wolfIdx=hole.wolf;
  var wolfPlayer=state.players[wolfIdx];
  document.getElementById('wolf-who-name').textContent=wolfPlayer?wolfPlayer.full_name:'—';

  var wp=hole.wolfPartner;
  var isLone=hole.loneWolf;
  var isBlind=hole.wolfBlind;

  document.getElementById('btn-lone-wolf').classList.toggle('active', isLone&&!isBlind);
  document.getElementById('btn-blind-wolf').classList.toggle('active', isBlind);

  var container=document.getElementById('wolf-cards');
  container.innerHTML='';

  state.players.forEach(function(p,pi){
    var isWolf=pi===wolfIdx;
    var isPartner=!isLone&&wp===pi&&!isWolf;
    var btn=document.createElement('div');
    btn.className='wolf-player-btn';
    if(isWolf) btn.classList.add('is-wolf');
    if(isPartner) btn.classList.add('is-partner');

    var roleText='';
    if(isWolf&&!isLone) roleText='🐺 Wolf';
    else if(isWolf&&isBlind) roleText='🐺 Blind Wolf';
    else if(isWolf&&isLone) roleText='🐺 Lone Wolf';
    else if(isPartner) roleText='🤝 Partner';
    else roleText='⛳ Opponent';

    var totalPts=calcWolfTotalPts(pi);
    btn.innerHTML=
      '<div class="wpb-abbr">'+esc(p.abbreviation||p.full_name.charAt(0))+'</div>'+
      '<div class="wpb-name">'+esc(p.full_name)+'</div>'+
      '<div class="wpb-role">'+roleText+'</div>'+
      '<div class="wpb-pts">'+totalPts+' pts</div>'+
      '<div class="wolf-adjust-row">'+
        '<button class="wolf-adjust-btn" onclick="event.stopPropagation();adjustWolfPoints('+pi+',-1)">−</button>'+
        '<span class="wolf-adjust-lbl">Wolf Points</span>'+
        '<button class="wolf-adjust-btn" onclick="event.stopPropagation();adjustWolfPoints('+pi+',1)">+</button>'+
      '</div>';

    if(!isWolf&&!isLone){
      btn.style.cursor='pointer';
      (function(playerIdx, wasPartner){
        btn.addEventListener('click',function(){
          if(wasPartner){
            hole.wolfPartner=null;
          } else {
            hole.wolfPartner=playerIdx;
            hole.loneWolf=false;
            hole.wolfBlind=false;
          }
          refreshHole(holeIdx);
        });
      })(pi, isPartner);
    }
    container.appendChild(btn);
  });
}

function toggleLoneWolf(blind){
  var h=playState.currentHole;
  var hole=getHoleState(h);
  var alreadySet=hole.loneWolf&&hole.wolfBlind===blind;
  if(alreadySet){
    hole.loneWolf=false;
    hole.wolfBlind=false;
  } else {
    hole.loneWolf=true;
    hole.wolfBlind=blind;
    hole.wolfPartner=null;
  }
  refreshHole(h);
}

/* ============================================================
   PAR 3 RENDER
   ============================================================ */
function renderPar3(holeIdx){
  var container=document.getElementById('par3-cards');
  container.innerHTML='';
  var h=state.holes[holeIdx];
  if(h.par!==3){
    container.innerHTML='<div class="par3-na">Par 3 Challenge — not applicable on Par '+h.par+'</div>';
    return;
  }
  state.players.forEach(function(p,pi){
    var dist=getPar3Dist(pi,holeIdx);
    var card=document.createElement('div');
    card.className='par3-card';
    card.innerHTML=
      '<div class="p3-name">'+esc(p.full_name)+'</div>'+
      '<input class="p3-dist" type="number" min="0" max="9999" placeholder="—" value="'+(dist!==null?dist:'')+'" id="p3d-'+pi+'-'+holeIdx+'">'+
      '<div class="p3-unit">ft from pin</div>';
    var input=card.querySelector('.p3-dist');
    (function(playerIdx){
      input.addEventListener('change',function(){
        var v=parseInt(input.value);
        setPar3Dist(playerIdx,holeIdx,isFinite(v)?v:null);
      });
    })(pi);
    container.appendChild(card);
  });
}

/* ============================================================
   SUMMARY BAR
   ============================================================ */
function renderSummary(){
  renderStatusPanel('summary-bar',function(p,pi){
    var tot=0,parTot=0,played=0;
    for(var i=0;i<18;i++){
      var score=getScore(pi,i);
      if(score!==null){ tot+=score; parTot+=state.holes[i].par; played++; }
    }
    var diff=tot-parTot;
    var diffStr=played===0?'—':diff===0?'E':diff>0?'+'+diff:String(diff);
    var cls=played===0?'':diff<0?'under':diff>3?'dbl':diff>0?'over':'';
    return {
      name:p.abbreviation||p.full_name.charAt(0),
      value:diffStr,
      valueClass:cls,
      meta:played?'thru '+played:'—'
    };
  });
}

    playState=makePlayState();
    goHole(0);
    buildFmtTabs();
  }
}

/* ============================================================
   PRINT SCORECARD BUILDER
   ============================================================ */
function buildScorecard(){
  var prev=document.getElementById('scorecard-preview');
  if(!prev) return;
  var enabled=state.formats.filter(function(f){ return f.enabled; });
  var html='';
  html+=buildHeader();
  html+=buildStrokeTable();
  var fmtNum=2;
  enabled.forEach(function(f){
    if(f.id==='ptm')  { html+=buildPTMTable(fmtNum++); }
    if(f.id==='wolf') { html+=buildWolfTable(fmtNum++); }
    if(f.id==='par3') { html+=buildPar3Table(fmtNum++); }
  });
  prev.innerHTML=html;
}

function buildHeader(){
  var courseName=state.course_name||'BEAVER BROOK COUNTRY CLUB';
  var teeColor=state.tee_color||'';
  var groupName=state.group_name||'';
  var today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return '<div class="sc-header">'+
    '<div>'+
      '<div class="sc-course">'+esc(courseName)+'</div>'+
      '<div class="sc-sub">'+(teeColor?esc(teeColor):'')+(teeColor&&groupName?' · ':'')+esc(groupName)+'</div>'+
    '</div>'+
    '<div class="sc-gold">🤜 PlayPal · '+today+'</div>'+
  '</div>';
}

function buildStrokeTable(){
  var players=state.players;
  var holes=state.holes;
  var n=players.length;
  var t='<div class="sc-fmt-hdr"><span>FORMAT 1 — STROKE PLAY</span><span class="sc-fmt-rule">Record gross score each hole</span></div>';
  t+=colGroupHTML();
  t+='<table class="sc-table">';
  t+=holeHeaderRow('PLAYER');
  t+='<tr><td class="lbl">Par</td>';
  var parOut=0,parIn=0;
  for(var i=0;i<9;i++){ t+='<td>'+holes[i].par+'</td>'; parOut+=holes[i].par; }
  t+='<td class="sum">'+parOut+'</td>';
  for(var i=9;i<18;i++){ t+='<td>'+holes[i].par+'</td>'; parIn+=holes[i].par; }
  t+='<td class="sum">'+parIn+'</td><td class="sum">'+(parOut+parIn)+'</td></tr>';
  t+='<tr><td class="lbl">Yards</td>';
  var yOut=0,yIn=0;
  for(var i=0;i<9;i++){ t+='<td>'+holes[i].yards+'</td>'; yOut+=holes[i].yards; }
  t+='<td class="sum">'+yOut+'</td>';
  for(var i=9;i<18;i++){ t+='<td>'+holes[i].yards+'</td>'; yIn+=holes[i].yards; }
  t+='<td class="sum">'+yIn+'</td><td class="sum">'+(yOut+yIn)+'</td></tr>';
  players.forEach(function(p,pi){
    t+='<tr><td class="lbl">'+esc(p.full_name)+'</td>';
    var out=0,inVal=0,outFilled=true,inFilled=true;
    for(var i=0;i<9;i++){
      var s=playState?getScore(pi,i):null;
      t+='<td>'+(s!==null?s:'')+'</td>';
      if(s===null) outFilled=false; else out+=s;
    }
    t+='<td class="sum">'+(outFilled?out:'')+'</td>';
    for(var i=9;i<18;i++){
      var s=playState?getScore(pi,i):null;
      t+='<td>'+(s!==null?s:'')+'</td>';
      if(s===null) inFilled=false; else inVal+=s;
    }
    t+='<td class="sum">'+(inFilled?inVal:'')+'</td>';
    t+='<td class="sum">'+((outFilled&&inFilled)?out+inVal:'')+'</td></tr>';
  });
  t+='</table>';
  return t;
}

function buildPTMTable(num){
  var players=state.players;
  var t='<div class="sc-fmt-hdr"><span>FORMAT '+num+' — PTM (PASS THE MONEY)</span>'+
        '<span class="sc-fmt-rule">3-putt or double+ passes to next player · Bogey or better with no 3-putt keeps</span></div>';
  t+=colGroupHTML();
  t+='<table class="sc-table">';
  t+=holeHeaderRow('PLAYER');
  players.forEach(function(p,pi){
    var ab=esc(p.abbreviation||'?');
    t+='<tr><td class="lbl">'+esc(p.full_name)+'</td>';
    for(var i=0;i<9;i++){
      var holder=resolvePtmAutoForPrint(i);
      var is=holder===pi;
      t+='<td style="'+(is?'font-weight:900;text-decoration:underline;':'')+'">'+ab+'</td>';
    }
    var h9=resolvePtmAutoForPrint(8)===pi;
    t+='<td class="sum" style="'+(h9?'font-weight:900;':'')+'">'+( h9?'★':ab)+'</td>';
    for(var i=9;i<18;i++){
      var holder=resolvePtmAutoForPrint(i);
      var is=holder===pi;
      t+='<td style="'+(is?'font-weight:900;text-decoration:underline;':'')+'">'+ab+'</td>';
    }
    var h18=resolvePtmAutoForPrint(17)===pi;
    t+='<td class="sum" style="'+(h18?'font-weight:900;':'')+'">'+( h18?'★':ab)+'</td>';
    t+='<td class="sum"></td></tr>';
  });
  t+='</table>';
  t+='<div class="sc-ptm-footer">'+
       '<span>BUNDLE HOLDER AT HOLE 9: ________________</span>'+
       '<span>BUNDLE HOLDER AT HOLE 18: ________________</span>'+
       '<span>TRANSFERS THIS ROUND: _____</span>'+
     '</div>';
  return t;
}

function resolvePtmAutoForPrint(holeIdx){
  if(!playState) return 0;
  return holeIdx===17 ? resolvePtmFinalHole18() : resolvePtmAuto(holeIdx);
}

function buildWolfTable(num){
  var players=state.players;
  var rotation=players.map(function(p){ return esc(p.full_name); }).join(' · ');
  var t='<div class="sc-fmt-hdr"><span>FORMAT '+num+' — WOLF</span>'+
        '<span class="sc-fmt-rule">Rotation: '+rotation+' (repeat) · Tap to select partner before all tee</span></div>';
  t+=colGroupHTML();
  t+='<table class="sc-table">';
  t+=holeHeaderRow('WOLF');
  t+='<tr><td class="lbl" style="font-size:6pt">IS WOLF</td>';
  for(var i=0;i<9;i++) t+='<td style="color:#C0392B;font-weight:700">'+esc(players[getWolfIdx(i)].abbreviation)+'</td>';
  t+='<td class="sum"></td>';
  for(var i=9;i<18;i++) t+='<td style="color:#C0392B;font-weight:700">'+esc(players[getWolfIdx(i)].abbreviation)+'</td>';
  t+='<td class="sum"></td><td class="sum"></td></tr>';
  t+='<tr><td class="lbl">PARTNER (circle)</td>';
  for(var i=0;i<18;i++){
    var wp=playState?(getHoleState(i).loneWolf?-1:getHoleState(i).wolfPartner):null;
    var isLone=wp===-1;
    var cell;
    if(isLone) cell='<span style="text-decoration:underline;color:#C0392B">LONE</span>';
    else if(wp!==null&&wp!==getWolfIdx(i)&&players[wp]) cell='<span style="text-decoration:underline">'+esc(players[wp].abbreviation)+'</span>';
    else cell='';
    t+='<td>'+cell+'</td>';
    if(i===8) t+='<td class="sum"></td>';
  }
  t+='<td class="sum"></td><td class="sum"></td></tr>';
  players.forEach(function(p,pi){
    t+='<tr><td class="lbl">'+esc(p.full_name)+'</td>';
    for(var i=0;i<9;i++){
      var pts=calcWolfPts(i)[pi];
      t+='<td>'+(pts?pts:'')+'</td>';
    }
    var outPts=0;
    for(var i=0;i<9;i++) outPts+=calcWolfPts(i)[pi];
    t+='<td class="sum">'+(outPts||'')+'</td>';
    for(var i=9;i<18;i++){
      var pts=calcWolfPts(i)[pi];
      t+='<td>'+(pts?pts:'')+'</td>';
    }
    var inPts=0;
    for(var i=9;i<18;i++) inPts+=calcWolfPts(i)[pi];
    t+='<td class="sum">'+(inPts||'')+'</td>';
    t+='<td class="sum">'+(outPts+inPts||'')+'</td></tr>';
  });
  t+='</table>';
  return t;
}

function buildPar3Table(num){
  var players=state.players;
  var par3holes=[];
  state.holes.forEach(function(h,i){ if(h.par===3) par3holes.push(i); });
  var t='<div class="sc-fmt-hdr"><span>FORMAT '+num+' — PAR 3 CHALLENGE</span>'+
        '<span class="sc-fmt-rule">Closest to pin on each par 3 · Record distance in feet</span></div>';
  t+='<table class="sc-table"><tr><th>Player</th>';
  par3holes.forEach(function(i){ t+='<th>Hole '+(i+1)+'</th>'; });
  t+='<th>WINS</th></tr>';
  players.forEach(function(p,pi){
    t+='<tr><td class="lbl">'+esc(p.full_name)+'</td>';
    var wins=0;
    par3holes.forEach(function(i){
      var dist=playState?getPar3Dist(pi,i):null;
      t+='<td>'+(dist!==null?dist+'\'':'')+'</td>';
      if(dist!==null && playState){
        var allDists=state.players.map(function(_,x){ return getPar3Dist(x,i); });
        var minDist=null;
        allDists.forEach(function(d){ if(d!==null&&(minDist===null||d<minDist)) minDist=d; });
        if(dist===minDist){
          var ties=allDists.filter(function(d){ return d===minDist; }).length;
          if(ties===1) wins++;
        }
      }
    });
    t+='<td class="sum">'+wins+'</td></tr>';
  });
  t+='</table>';
  return t;
}

function holeHeaderRow(firstCol){
  var t='<tr class="row-header"><th>'+esc(firstCol)+'</th>';
  for(var i=1;i<=9;i++) t+='<th>'+i+'</th>';
  t+='<th class="sum">OUT</th>';
  for(var i=10;i<=18;i++) t+='<th>'+i+'</th>';
  t+='<th class="sum">IN</th><th class="sum">TOT</th></tr>';
  return t;
}

function colGroupHTML(){
  var t='<colgroup><col style="width:68px">';
  for(var i=0;i<9;i++) t+='<col>';
  t+='<col style="width:26px">';
  for(var i=0;i<9;i++) t+='<col>';
  t+='<col style="width:26px"><col style="width:34px"></colgroup>';
  return t;
}
